    // ── 主 APP（多頁路由）────────────────────────────────
    function App() {
      const [page, setPage] = useState("home");
      const [clientName, setClientName] = useState("");
      const [sharedSalary, setSharedSalary] = useState(50000);
      const [sharedMonthlyNeed, setSharedMonthlyNeed] = useState(60000);

      const navItems = [
        { id:"home",       label:"首頁", icon:"⌂" },
        { id:"retirement", label:"退休", icon:"📊" },
        { id:"insurance",  label:"保險", icon:"🛡" },
        { id:"health",     label:"房產", icon:"🏠" },
        { id:"tax",        label:"稅務", icon:"📋" },
      ];

      return (
        <div style={{ minHeight:"100vh", background:C.bg, fontFamily:"'Noto Sans TC','Microsoft JhengHei',sans-serif", color:C.text }}>

          {/* Header */}
          <div className="no-print" style={{ background:C.navyDeep, padding:"20px 24px 16px", position:"sticky", top:0, zIndex:100 }}>
            <div style={{ maxWidth:960, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:13, color:"#a8bece", letterSpacing:"0.1em", marginBottom:5 }}>CFP® 國際認證理財規劃顧問</div>
                <div style={{ fontSize:22, fontWeight:700, color:"#eee8e0", letterSpacing:"0.04em" }}>連信銓　財務顧問</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <input
                  type="text"
                  value={clientName}
                  onChange={e=>setClientName(e.target.value)}
                  placeholder="輸入客戶姓名"
                  style={{ padding:"5px 10px", borderRadius:8, border:"1px solid rgba(255,255,255,0.2)", background:"rgba(255,255,255,0.1)", color:"#eee8e0", fontSize:12, outline:"none", width:100, fontFamily:"inherit" }}
                />
                <div style={{ fontSize:11, color:"#a8bece" }}>{navItems.find(n=>n.id===page)?.label}</div>
              </div>
            </div>
          </div>

          {/* 頁面內容 */}
          <div>
            {page==="home"       && <HomePage onNavigate={setPage}/>}
            {page==="retirement" && <RetirementCalculator clientName={clientName} initSalary={sharedSalary} initMonthlyNeed={sharedMonthlyNeed} onSalaryChange={setSharedSalary} onNeedChange={setSharedMonthlyNeed}/>}
            {page==="health"     && <PropertyPlan clientName={clientName}/>}
            {page==="cashflow"   && <ComingSoon title="收支健診" icon="💰" desc="此功能即將推出。" />}
            {page==="assets"     && <ComingSoon title="資產負債分析" icon="🏦" desc="此功能即將推出。" />}
            {page==="insurance"  && <InsuranceGap clientName={clientName} salary={sharedSalary}/>}
            {page==="tax"        && <EstateTax clientName={clientName}/>}
          </div>

          {/* 底部導覽列 */}
          <div className="no-print" style={{ position:"fixed", bottom:0, left:0, right:0, background:C.card, borderTop:`1px solid ${C.border}`, display:"flex", zIndex:100, boxShadow:"0 -2px 8px rgba(100,90,80,0.08)", paddingLeft:8, paddingRight:8, paddingBottom:"env(safe-area-inset-bottom, 4px)" }}>
            {navItems.map(item=>{
              const active = page===item.id;
              return (
                <button key={item.id} onClick={()=>setPage(item.id)}
                  style={{ flex:1, padding:"8px 0 10px", border:"none", background:"transparent", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, transition:"background 0.15s", minWidth:0 }}>
                  <span style={{ fontSize:18 }}>{item.icon}</span>
                  <span style={{ fontSize:9, fontWeight:active?700:400, color:active?C.navyDeep:C.textLight, letterSpacing:"0.02em" }}>{item.label}</span>
                  {active && <div style={{ width:20, height:2, background:C.navyDeep, borderRadius:1 }}/>}
                </button>
              );
            })}
          </div>

          {/* 列印浮動按鈕 */}
          {page !== "home" && (
            <button className="no-print" onClick={()=>window.print()}
              style={{ position:"fixed", bottom:80, right:16, width:48, height:48, borderRadius:"50%", background:C.navyDeep, border:"none", color:"#eee8e0", fontSize:18, cursor:"pointer", boxShadow:"0 2px 8px rgba(0,0,0,0.2)", zIndex:99, display:"flex", alignItems:"center", justifyContent:"center" }}
              title="列印 / 儲存為 PDF">
              🖨️
            </button>
          )}
          {/* 底部導覽佔位 */}
          <div style={{ height:70 }}/>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
